<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkyBooker – Flight Booking System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script>
(function(){
  var t = localStorage.getItem('skybooker-theme');
  if(t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
})();
</script>
<style>
/* ===== CSS Reset & Variables ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Light theme (default) */
:root {
  --contrast: #000000;
  --contrast-inv: #ffffff;
  --contrast-rgb: 0,0,0;
  --primary-hover: #222222;
  --accent: #888888;
  --danger: #dc2626;
  --danger-rgb: 220,38,38;
  --warning: #d97706;
  --bg: #f4f4f5;
  --surface: #ffffff;
  --surface-alt: #f0f0f1;
  --surface-elevated: #fafafa;
  --text: #18181b;
  --text-secondary: #52525b;
  --text-muted: #a1a1aa;
  --border: #e4e4e7;
  --border-light: #d4d4d8;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow: 0 8px 24px rgba(0,0,0,.08);
  --shadow-lg: 0 20px 60px rgba(0,0,0,.1);
  --transition: .3s cubic-bezier(.4,0,.2,1);
  --glow: 0 0 40px rgba(0,0,0,.02);
  --overlay: rgba(0,0,0,.35);
}

/* Dark theme */
[data-theme="dark"] {
  --contrast: #ffffff;
  --contrast-inv: #000000;
  --contrast-rgb: 255,255,255;
  --primary-hover: #e0e0e0;
  --accent: #a0a0a0;
  --danger: #ff3b3b;
  --danger-rgb: 255,59,59;
  --warning: #ffb800;
  --bg: #0a0a0a;
  --surface: #111111;
  --surface-alt: #1a1a1a;
  --surface-elevated: #1e1e1e;
  --text: #f5f5f5;
  --text-secondary: #888888;
  --text-muted: #555555;
  --border: #222222;
  --border-light: #2a2a2a;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
  --shadow: 0 8px 24px rgba(0,0,0,.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,.5);
  --glow: 0 0 40px rgba(255,255,255,.04);
  --overlay: rgba(0,0,0,.7);
}

body {
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
a { color: var(--contrast); text-decoration: none; }
button { cursor: pointer; font-family: inherit; }

/* Theme transition class – applied briefly during toggle */
html.theme-transition,
html.theme-transition *,
html.theme-transition *::before,
html.theme-transition *::after {
  transition: background-color .4s ease, color .4s ease, border-color .4s ease, box-shadow .4s ease !important;
}

/* ===== Utility ===== */
.hidden { display: none !important; }

/* ===== Toast ===== */
#toast-container {
  position: fixed; top: 28px; right: 28px; z-index: 9999;
  display: flex; flex-direction: column; gap: 10px;
}
.toast {
  padding: 16px 24px; border-radius: var(--radius-sm); color: var(--text);
  font-size: .9rem; font-weight: 500; letter-spacing: .01em;
  box-shadow: var(--shadow-lg);
  animation: slideIn .4s cubic-bezier(.16,1,.3,1);
  max-width: 380px;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(var(--contrast-rgb),.08);
}
.toast.success { background: rgba(var(--contrast-rgb),.07); border-left: 3px solid var(--contrast); }
.toast.error   { background: rgba(var(--danger-rgb),.1); border-left: 3px solid var(--danger); }
.toast.info    { background: rgba(var(--contrast-rgb),.05); border-left: 3px solid var(--accent); }
@keyframes slideIn { from { opacity: 0; transform: translateX(80px) scale(.95); } to { opacity: 1; transform: translateX(0) scale(1); } }
@keyframes fadeOut  { to { opacity: 0; transform: translateX(80px) scale(.95); } }

/* ===== Auth Page ===== */
#auth-page {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
#auth-page::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(var(--contrast-rgb),.03) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.auth-card {
  background: var(--surface);
  border-radius: 24px;
  padding: 56px 48px;
  width: 440px;
  max-width: 95vw;
  box-shadow: var(--shadow-lg), var(--glow);
  border: 1px solid var(--border-light);
  position: relative;
  z-index: 1;
}
.auth-card h1 {
  font-size: 2rem;
  text-align: center;
  margin-bottom: 8px;
  color: var(--contrast);
  font-weight: 800;
  letter-spacing: -.03em;
}
.auth-card .subtitle {
  text-align: center;
  color: var(--text-secondary);
  margin-bottom: 36px;
  font-size: .9rem;
  letter-spacing: .04em;
  text-transform: uppercase;
  font-weight: 500;
}
.auth-tabs {
  display: flex; gap: 0;
  background: var(--surface-alt);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 28px;
  border: 1px solid var(--border);
}
.auth-tabs button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: .88rem;
  font-weight: 600;
  background: transparent;
  color: var(--text-muted);
  transition: var(--transition);
  letter-spacing: .02em;
}
.auth-tabs button.active {
  background: var(--contrast);
  color: var(--contrast-inv);
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.form-group {
  margin-bottom: 18px;
}
.form-group label {
  display: block;
  font-size: .78rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  font-size: .92rem;
  transition: var(--transition);
  background: var(--surface-alt);
  color: var(--text);
  font-family: inherit;
}
.form-group input::placeholder { color: var(--text-muted); }
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--contrast);
  box-shadow: 0 0 0 3px rgba(var(--contrast-rgb),.08);
  background: var(--surface-elevated);
}
.form-group select option { background: var(--surface); color: var(--text); }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 28px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: .92rem;
  font-weight: 600;
  transition: var(--transition);
  letter-spacing: .02em;
}
.btn-primary {
  background: var(--contrast); color: var(--contrast-inv); width: 100%;
}
.btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(var(--contrast-rgb),.12); }
.btn-success { background: var(--contrast); color: var(--contrast-inv); }
.btn-success:hover { background: var(--primary-hover); transform: translateY(-1px); }
.btn-danger  { background: transparent; color: var(--danger); border: 1px solid rgba(var(--danger-rgb),.3); }
.btn-danger:hover  { background: rgba(var(--danger-rgb),.08); border-color: var(--danger); }
.btn-outline {
  background: transparent; border: 1px solid var(--border-light); color: var(--text-secondary);
}
.btn-outline:hover { border-color: var(--contrast); color: var(--contrast); }
.btn-sm { padding: 10px 20px; font-size: .82rem; border-radius: 8px; }
.btn-icon {
  width: 40px; height: 40px; padding: 0;
  border-radius: var(--radius-sm); border: 1px solid var(--border-light);
  background: var(--surface); color: var(--text-secondary);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
}
.btn-icon:hover { border-color: var(--contrast); color: var(--contrast); }

/* ===== App Shell ===== */
#app-page { display: flex; min-height: 100vh; background: var(--bg); }
.sidebar {
  width: 272px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 32px 20px;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 10;
}
.sidebar .brand {
  font-size: 1.4rem; font-weight: 800;
  color: var(--contrast);
  margin-bottom: 4px;
  padding: 0 10px;
  letter-spacing: -.03em;
}
.sidebar .brand-sub {
  font-size: .72rem;
  color: var(--text-muted);
  padding: 0 10px;
  margin-bottom: 36px;
  text-transform: uppercase;
  letter-spacing: .1em;
  font-weight: 500;
}
.sidebar nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  border-radius: var(--radius-sm);
  font-size: .9rem;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  border: none; background: none; width: 100%; text-align: left;
  position: relative;
}
.nav-item:hover { background: var(--surface-alt); color: var(--text); }
.nav-item.active {
  background: var(--contrast);
  color: var(--contrast-inv);
  font-weight: 600;
  box-shadow: 0 2px 12px rgba(var(--contrast-rgb),.08);
}
.nav-item .icon { font-size: 1.15rem; width: 24px; text-align: center; }
.sidebar .user-info {
  border-top: 1px solid var(--border);
  padding-top: 20px;
  margin-top: 20px;
}
.sidebar .user-info .user-name { font-weight: 600; font-size: .95rem; color: var(--text); }
.sidebar .user-info .user-role {
  font-size: .8rem;
  color: var(--text-secondary);
  display: flex; align-items: center; gap: 8px;
  margin-top: 4px;
}
.sidebar .user-info .role-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.role-badge.admin { background: rgba(var(--contrast-rgb),.1); color: var(--contrast); }
.role-badge.passenger { background: rgba(var(--contrast-rgb),.06); color: var(--text-secondary); }
.logout-btn {
  margin-top: 16px;
  width: 100%;
  padding: 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: none;
  font-size: .85rem;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: .02em;
}
.logout-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(var(--danger-rgb),.05); }

/* Main Content */
.main-content {
  margin-left: 272px;
  flex: 1;
  padding: 40px 48px;
  max-width: 1200px;
}
.page-header {
  margin-bottom: 36px;
}
.page-header h2 {
  font-size: 1.75rem; font-weight: 700; margin-bottom: 6px;
  letter-spacing: -.03em; color: var(--contrast);
}
.page-header p { color: var(--text-muted); font-size: .9rem; letter-spacing: .01em; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 28px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}
.card:hover { box-shadow: var(--shadow); border-color: var(--border-light); }
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.card-header h3 { font-size: 1.1rem; font-weight: 600; letter-spacing: -.01em; }

/* Search */
.search-bar {
  display: flex; gap: 12px; margin-bottom: 28px;
}
.search-bar input {
  flex: 1;
  padding: 14px 20px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  font-size: .92rem;
  transition: var(--transition);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
}
.search-bar input::placeholder { color: var(--text-muted); }
.search-bar input:focus {
  outline: none;
  border-color: var(--contrast);
  box-shadow: 0 0 0 3px rgba(var(--contrast-rgb),.06);
}

/* Table */
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: .88rem;
}
thead th {
  text-align: left;
  padding: 14px 18px;
  font-weight: 600;
  color: var(--text-muted);
  font-size: .75rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  border-bottom: 1px solid var(--border);
  background: var(--surface-alt);
}
thead th:first-child { border-radius: var(--radius-sm) 0 0 0; }
thead th:last-child  { border-radius: 0 var(--radius-sm) 0 0; }
tbody td {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  color: var(--text-secondary);
}
tbody td:first-child { color: var(--text); }
tbody tr { transition: var(--transition); }
tbody tr:hover { background: rgba(var(--contrast-rgb),.03); }
tbody tr:last-child td { border-bottom: none; }
.seats-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: .78rem;
  font-weight: 600;
  letter-spacing: .02em;
}
.seats-badge.ok   { background: rgba(var(--contrast-rgb),.07); color: var(--contrast); }
.seats-badge.low  { background: rgba(255,184,0,.1); color: var(--warning); }
.seats-badge.full { background: rgba(var(--danger-rgb),.1); color: var(--danger); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: var(--overlay);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  animation: fadeInOverlay .25s ease;
}
@keyframes fadeInOverlay { from { opacity: 0; } }
.modal {
  background: var(--surface);
  border-radius: 20px;
  padding: 40px;
  width: 500px;
  max-width: 92vw;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border-light);
  animation: scaleIn .3s cubic-bezier(.16,1,.3,1);
}
@keyframes scaleIn { from { opacity:0; transform: scale(.92) translateY(10px); } }
.modal h3 { font-size: 1.25rem; margin-bottom: 24px; font-weight: 700; letter-spacing: -.02em; }
.modal .form-group { margin-bottom: 16px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; margin-bottom: 32px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 80px;
  background: radial-gradient(circle, rgba(var(--contrast-rgb),.03) 0%, transparent 70%);
  pointer-events: none;
}
.stat-card:hover { border-color: var(--border-light); box-shadow: var(--shadow); }
.stat-card .stat-label {
  font-size: .75rem; color: var(--text-muted); font-weight: 600; margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: .08em;
}
.stat-card .stat-value { font-size: 2rem; font-weight: 800; letter-spacing: -.03em; color: var(--contrast); }
.stat-card .stat-icon  { font-size: 1.5rem; margin-bottom: 12px; opacity: .6; }

/* Empty state */
.empty-state {
  text-align: center; padding: 56px 24px; color: var(--text-muted);
}
.empty-state .icon { font-size: 2.5rem; margin-bottom: 16px; opacity: .4; }
.empty-state h4 { font-size: 1.1rem; margin-bottom: 8px; color: var(--text-secondary); font-weight: 600; }
.empty-state p { font-size: .88rem; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Selection */
::selection { background: rgba(var(--contrast-rgb),.12); color: var(--contrast); }

/* ===== Theme Toggle Button ===== */
#theme-toggle {
  position: fixed;
  bottom: 32px;
  right: 32px;
  z-index: 9998;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 1px solid var(--border-light);
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease;
  overflow: hidden;
}
#theme-toggle:hover {
  transform: scale(1.1);
  box-shadow: var(--shadow-lg);
  border-color: var(--contrast);
}
#theme-toggle:active {
  transform: scale(.95);
}
#theme-toggle .toggle-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  transition: transform .4s cubic-bezier(.4,0,.2,1);
}
</style>
</head>
<body>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Theme Toggle -->
<button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
  <span class="toggle-icon" id="theme-icon"></span>
</button>

<!-- ===== AUTH PAGE ===== -->
<div id="auth-page">
  <div class="auth-card">
    <h1>SKYBOOKER</h1>
    <p class="subtitle">Flight Booking System</p>

    <div class="auth-tabs">
      <button class="active" onclick="showAuthTab('login')">Login</button>
      <button onclick="showAuthTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input id="login-user" type="text" placeholder="Enter your username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="login-pass" type="password" placeholder="Enter your password" />
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
      <p style="text-align:center;margin-top:18px;font-size:.8rem;color:var(--text-muted);letter-spacing:.02em">
        Demo: admin / admin123
      </p>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
      <div class="form-group">
        <label>Username</label>
        <input id="reg-user" type="text" placeholder="Choose a username" />
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <input id="reg-name" type="text" placeholder="Your full name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="reg-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="reg-pass" type="password" placeholder="Create a password" />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="reg-role">
          <option value="passenger">Passenger</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>

<!-- ===== APP PAGE ===== -->
<div id="app-page" class="hidden">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">SKYBOOKER</div>
    <div class="brand-sub">Flight Booking System</div>
    <nav id="sidebar-nav"></nav>
    <div class="user-info">
      <div class="user-name" id="side-user-name"></div>
      <div class="user-role"><span class="role-badge" id="side-user-role"></span></div>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content" id="main-content"></main>
</div>

<!-- ===== JavaScript ===== -->
<script>
// ---- Helpers ----
function $(id){ return document.getElementById(id); }
function toast(msg, type='info'){
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  $('toast-container').appendChild(el);
  setTimeout(()=>{ el.style.animation='fadeOut .3s ease forwards'; setTimeout(()=>el.remove(),300); }, 3000);
}
async function api(method, ...args){
  const raw = await window.pywebview.api[method](...args);
  return JSON.parse(raw);
}

let currentRole = '';
let currentSection = '';

// ---- Theme Toggle ----
function toggleTheme(){
  const html = document.documentElement;
  html.classList.add('theme-transition');
  const isDark = html.getAttribute('data-theme') === 'dark';
  if(isDark){
    html.removeAttribute('data-theme');
    localStorage.setItem('skybooker-theme','light');
  } else {
    html.setAttribute('data-theme','dark');
    localStorage.setItem('skybooker-theme','dark');
  }
  updateThemeIcon();
  setTimeout(()=> html.classList.remove('theme-transition'), 500);
}

function updateThemeIcon(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const icon = $('theme-icon');
  if(isDark){
    icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  } else {
    icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
}
updateThemeIcon();

// ---- Auth ----
function showAuthTab(tab){
  document.querySelectorAll('.auth-tabs button').forEach(b=>b.classList.remove('active'));
  if(tab==='login'){
    $('login-form').classList.remove('hidden');
    $('register-form').classList.add('hidden');
    document.querySelectorAll('.auth-tabs button')[0].classList.add('active');
  } else {
    $('login-form').classList.add('hidden');
    $('register-form').classList.remove('hidden');
    document.querySelectorAll('.auth-tabs button')[1].classList.add('active');
  }
}
async function doLogin(){
  const u = $('login-user').value.trim();
  const p = $('login-pass').value;
  if(!u||!p){ toast('Please fill in all fields','error'); return; }
  const r = await api('login', u, p);
  if(r.ok){ toast('Welcome back, '+r.name+'!','success'); enterApp(r.role, r.name); }
  else { toast(r.msg,'error'); }
}
async function doRegister(){
  const u = $('reg-user').value.trim();
  const n = $('reg-name').value.trim();
  const e = $('reg-email').value.trim();
  const p = $('reg-pass').value;
  const role = $('reg-role').value;
  if(!u||!n||!e||!p){ toast('Please fill in all fields','error'); return; }
  const r = await api('register', u, n, e, p, role);
  if(r.ok){ toast('Registration successful!','success'); enterApp(r.role, n); }
  else { toast(r.msg,'error'); }
}
async function doLogout(){
  await api('logout');
  $('auth-page').classList.remove('hidden');
  $('app-page').classList.add('hidden');
  toast('Signed out','info');
}

// ---- Enter App ----
function enterApp(role, name){
  currentRole = role;
  $('auth-page').classList.add('hidden');
  $('app-page').classList.remove('hidden');
  $('side-user-name').textContent = name;
  const badge = $('side-user-role');
  badge.textContent = role;
  badge.className = 'role-badge ' + role.toLowerCase();
  buildNav();
  navigate(role==='Admin'?'dashboard':'flights');
}

// ---- Navigation ----
const navConfig = {
  Passenger: [
    { id:'flights',   icon:'◉', label:'Search Flights' },
    { id:'bookings',  icon:'◈', label:'My Bookings' },
  ],
  Admin: [
    { id:'dashboard', icon:'◎', label:'Dashboard' },
    { id:'flights',   icon:'◉',  label:'All Flights' },
    { id:'manage',    icon:'◆',  label:'Manage Flights' },
  ]
};
function buildNav(){
  const nav = $('sidebar-nav');
  nav.innerHTML = '';
  (navConfig[currentRole]||[]).forEach(item=>{
    const btn = document.createElement('button');
    btn.className = 'nav-item';
    btn.innerHTML = '<span class="icon">'+item.icon+'</span>'+item.label;
    btn.onclick = ()=> navigate(item.id);
    btn.dataset.section = item.id;
    nav.appendChild(btn);
  });
}
function navigate(section){
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(b=>{
    b.classList.toggle('active', b.dataset.section===section);
  });
  const main = $('main-content');
  switch(section){
    case 'dashboard': renderDashboard(main); break;
    case 'flights':   renderFlights(main); break;
    case 'bookings':  renderBookings(main); break;
    case 'manage':    renderManage(main); break;
  }
}

// ---- RENDER: Dashboard (Admin) ----
async function renderDashboard(el){
  const flights = await api('get_flights');
  const users   = (await api('get_current_user'));
  const totalSeats = flights.reduce((s,f)=>s+f.seats,0);
  el.innerHTML = `
    <div class="page-header"><h2>Dashboard</h2><p>Overview of the flight system</p></div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-icon">▲</div><div class="stat-label">Total Flights</div><div class="stat-value">${flights.length}</div></div>
      <div class="stat-card"><div class="stat-icon">■</div><div class="stat-label">Available Seats</div><div class="stat-value">${totalSeats}</div></div>
      <div class="stat-card"><div class="stat-icon">●</div><div class="stat-label">Your Role</div><div class="stat-value" style="font-size:1.2rem">Admin</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Recent Flights</h3></div>
      <div class="table-wrap">${flightTable(flights, false)}</div>
    </div>`;
}

// ---- RENDER: Flights (both roles) ----
async function renderFlights(el){
  const isAdmin = currentRole==='Admin';
  el.innerHTML = `
    <div class="page-header"><h2>${isAdmin?'All Flights':'Search Flights'}</h2>
    <p>${isAdmin?'View and manage all flights in the system':'Find and book your next flight'}</p></div>
    <div class="search-bar">
      <input id="flight-search" placeholder="Search by flight number, origin or destination…" oninput="searchFlightsDebounced()"/>
    </div>
    <div class="card" id="flights-card"><div class="table-wrap" id="flights-table-wrap"></div></div>`;
  loadFlightsTable('');
}
let _searchTimer;
function searchFlightsDebounced(){ clearTimeout(_searchTimer); _searchTimer=setTimeout(()=>loadFlightsTable($('flight-search').value),250); }
async function loadFlightsTable(kw){
  const flights = kw ? await api('search_flights',kw) : await api('get_flights');
  const wrap = $('flights-table-wrap');
  if(!flights.length){
    wrap.innerHTML = '<div class="empty-state"><div class="icon">○</div><h4>No flights found</h4><p>Try a different search term</p></div>';
    return;
  }
  wrap.innerHTML = flightTable(flights, currentRole==='Passenger');
}

function flightTable(flights, showBook){
  let html='<table><thead><tr><th>Flight</th><th>Origin</th><th>Destination</th><th>Date</th><th>Departure</th><th>Aircraft</th><th>Seats</th>';
  if(showBook) html+='<th>Action</th>';
  if(currentRole==='Admin') html+='<th>Passengers</th>';
  html+='</tr></thead><tbody>';
  flights.forEach(f=>{
    const cls = f.seats===0?'full':f.seats<=10?'low':'ok';
    html+=`<tr>
      <td style="font-weight:600">${f.number}</td><td>${f.origin}</td><td>${f.destination}</td>
      <td>${f.date}</td><td>${f.departure}</td><td>${f.aircraft}</td><td><span class="seats-badge ${cls}">${f.seats===0?'Full':f.seats}</span></td>`;
    if(showBook) html+=`<td><button class="btn btn-success btn-sm" onclick="bookFlight('${f.number}')" ${f.seats===0?'disabled style="opacity:.5"':''}>Book</button></td>`;
    if(currentRole==='Admin') html+=`<td><button class="btn btn-outline btn-sm" onclick="viewPassengers('${f.number}')">View</button></td>`;
    html+='</tr>';
  });
  html+='</tbody></table>';
  return html;
}

async function bookFlight(num){
  const r = await api('book_flight', num);
  toast(r.msg, r.ok?'success':'error');
  if(r.ok) loadFlightsTable($('flight-search')?.value||'');
}

// ---- RENDER: My Bookings (Passenger) ----
async function renderBookings(el){
  const bookings = await api('get_my_bookings');
  el.innerHTML = `
    <div class="page-header"><h2>My Bookings</h2><p>View and manage your flight bookings</p></div>
    <div class="card" id="bookings-card"></div>`;
  const card = $('bookings-card');
  if(!bookings.length){
    card.innerHTML='<div class="empty-state"><div class="icon">◇</div><h4>No bookings yet</h4><p>Search flights and book your first trip!</p></div>';
    return;
  }
  let html='<div class="table-wrap"><table><thead><tr><th>Flight</th><th>Origin</th><th>Destination</th><th>Date</th><th>Departure</th><th>Aircraft</th><th>Action</th></tr></thead><tbody>';
  bookings.forEach(f=>{
    html+=`<tr><td style="font-weight:600">${f.number}</td><td>${f.origin}</td><td>${f.destination}</td><td>${f.date}</td><td>${f.departure}</td><td>${f.aircraft}</td>
    <td><button class="btn btn-danger btn-sm" onclick="cancelBooking('${f.number}')">Cancel</button></td></tr>`;
  });
  html+='</tbody></table></div>';
  card.innerHTML=html;
}
async function cancelBooking(num){
  const r = await api('cancel_booking', num);
  toast(r.msg, r.ok?'success':'error');
  if(r.ok) renderBookings($('main-content'));
}

// ---- RENDER: Manage Flights (Admin) ----
async function renderManage(el){
  el.innerHTML = `
    <div class="page-header"><h2>Manage Flights</h2><p>Add, update or remove flights</p></div>
    <div style="display:flex;gap:10px;margin-bottom:24px">
      <button class="btn btn-primary btn-sm" onclick="showAddFlightModal()">+ Add Flight</button>
    </div>
    <div class="card"><div class="table-wrap" id="manage-table"></div></div>`;
  loadManageTable();
}
async function loadManageTable(){
  const flights = await api('get_flights');
  const wrap = $('manage-table');
  if(!flights.length){
    wrap.innerHTML='<div class="empty-state"><div class="icon">△</div><h4>No flights</h4><p>Add a flight to get started</p></div>';
    return;
  }
  let html='<table><thead><tr><th>Flight</th><th>Origin</th><th>Destination</th><th>Date</th><th>Aircraft</th><th>Departure</th><th>Seats</th><th>Actions</th></tr></thead><tbody>';
  flights.forEach(f=>{
    const cls = f.seats===0?'full':f.seats<=10?'low':'ok';
    html+=`<tr><td style="font-weight:600">${f.number}</td><td>${f.origin}</td><td>${f.destination}</td><td>${f.date}</td><td>${f.aircraft}</td>
    <td>${f.departure}</td><td><span class="seats-badge ${cls}">${f.seats===0?'Full':f.seats}</span></td>
    <td style="display:flex;gap:6px">
      <button class="btn btn-outline btn-sm" onclick="showUpdateTimeModal('${f.number}','${f.departure}')">Edit Time</button>
      <button class="btn btn-danger btn-sm" onclick="removeFlight('${f.number}')">Remove</button>
    </td></tr>`;
  });
  html+='</tbody></table>';
  wrap.innerHTML=html;
}

// ---- Modals ----
function closeModal(){ const m=document.querySelector('.modal-overlay'); if(m) m.remove(); }

function showAddFlightModal(){
  const overlay=document.createElement('div'); overlay.className='modal-overlay'; overlay.onclick=e=>{if(e.target===overlay)closeModal();};
  overlay.innerHTML=`<div class="modal"><h3>Add New Flight</h3>
    <div class="form-group"><label>Flight Number</label><input id="m-num" placeholder="e.g. CA1234"/></div>
    <div class="form-group"><label>Origin</label><input id="m-ori" placeholder="Departure city"/></div>
    <div class="form-group"><label>Destination</label><input id="m-dst" placeholder="Arrival city"/></div>
    <div class="form-group"><label>Departure Time</label><input id="m-time" placeholder="e.g. 2026-04-01 14:00"/></div>
    <div class="form-group"><label>Capacity</label><input id="m-cap" type="number" placeholder="e.g. 150"/></div>
    <div class="form-group"><label>Aircraft</label><input id="m-aircraft" placeholder="e.g. Boeing 737-800"/></div>
    <div class="form-group"><label>Flight Date</label><input id="m-date" type="date" placeholder="e.g. 2026-04-01"/></div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="doAddFlight()">Add Flight</button>
    </div></div>`;
  document.body.appendChild(overlay);
}
async function doAddFlight(){
  const num=$('m-num').value.trim(), ori=$('m-ori').value.trim(), dst=$('m-dst').value.trim(), time=$('m-time').value.trim(), cap=$('m-cap').value.trim(), aircraft=$('m-aircraft').value.trim(), date=$('m-date').value.trim();
  if(!num||!ori||!dst||!time||!cap||!aircraft||!date){ toast('Please fill all fields','error'); return; }
  const r = await api('add_flight', num, ori, dst, time, parseInt(cap), aircraft, date);
  toast(r.msg, r.ok?'success':'error');
  if(r.ok){ closeModal(); loadManageTable(); }
}

function showUpdateTimeModal(num, current){
  const overlay=document.createElement('div'); overlay.className='modal-overlay'; overlay.onclick=e=>{if(e.target===overlay)closeModal();};
  overlay.innerHTML=`<div class="modal"><h3>Update Departure Time</h3>
    <p style="margin-bottom:16px;color:var(--text-secondary)">Flight: <strong>${num}</strong></p>
    <div class="form-group"><label>New Departure Time</label><input id="m-newtime" value="${current}"/></div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="doUpdateTime('${num}')">Update</button>
    </div></div>`;
  document.body.appendChild(overlay);
}
async function doUpdateTime(num){
  const t=$('m-newtime').value.trim();
  if(!t){ toast('Please enter a time','error'); return; }
  const r = await api('update_flight_time', num, t);
  toast(r.msg, r.ok?'success':'error');
  if(r.ok){ closeModal(); loadManageTable(); }
}

async function removeFlight(num){
  const r = await api('remove_flight', num);
  toast(r.msg, r.ok?'success':'error');
  if(r.ok) loadManageTable();
}

// ---- View passengers modal ----
async function viewPassengers(num){
  const list = await api('get_flight_passengers', num);
  const overlay=document.createElement('div'); overlay.className='modal-overlay'; overlay.onclick=e=>{if(e.target===overlay)closeModal();};
  let body='';
  if(!list.length){ body='<div class="empty-state" style="padding:24px"><div class="icon">○</div><h4>No passengers</h4></div>'; }
  else {
    body='<table><thead><tr><th>Username</th><th>Name</th><th>Email</th></tr></thead><tbody>';
    list.forEach(p=>{ body+=`<tr><td>${p.username}</td><td>${p.name}</td><td>${p.email}</td></tr>`; });
    body+='</tbody></table>';
  }
  overlay.innerHTML=`<div class="modal"><h3>Passengers – ${num}</h3><div class="table-wrap">${body}</div>
    <div class="modal-actions"><button class="btn btn-outline btn-sm" onclick="closeModal()">Close</button></div></div>`;
  document.body.appendChild(overlay);
}

// Enter key support
document.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    if(!$('auth-page').classList.contains('hidden')){
      if(!$('login-form').classList.contains('hidden')) doLogin();
      else doRegister();
    }
  }
  if(e.key==='Escape') closeModal();
});
</script>
</body>
</html>
